<!DOCTYPE html>
<html>
<head>
<title>Patient Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f7fa; }
.navbar { background:#1e3c72; }
.navbar-brand { color:white !important; font-weight:bold; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">
<span class="navbar-brand">Patient Profile</span>
<button class="btn btn-light" onclick="goBack()">Back</button>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow p-4">
<h4 class="mb-3">Profile Details</h4>

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control" disabled>
</div>

<div class="mb-3">
<label>Gender</label>
<select id="gender" class="form-select">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" id="phone" class="form-control">
</div>

<button class="btn btn-primary w-100" onclick="updateProfile()">Save Changes</button>
<div id="msg" class="text-success text-center mt-2"></div>

</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "patient"){
window.location.href="patient_login.html";
}

function goBack(){
window.location.href="patient_dashboard.html";
}

async function loadProfile(){

const response = await fetch(`/patient/profile/${user.user_id}`);
const data = await response.json();

document.getElementById("name").value = user.name;
document.getElementById("gender").value = data.gender || "";
document.getElementById("phone").value = data.phone_number || "";

}

async function updateProfile(){

const gender = document.getElementById("gender").value;
const phone = document.getElementById("phone").value;

const response = await fetch(`/patient/profile/${user.user_id}`, {
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
gender: gender,
phone_number: phone
})
});

if(response.ok){
document.getElementById("msg").innerText="Profile updated successfully";
}else{
document.getElementById("msg").innerText="Error updating profile";
}

}

loadProfile();

</script>

</body>
</html>
