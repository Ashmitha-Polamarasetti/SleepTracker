<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f7fa; }
.navbar { background:#1e3c72; }
.navbar-brand { color:white !important; font-weight:bold; }
.card { border-radius:15px; }
.badge { font-size:0.9rem; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container-fluid">
<span class="navbar-brand">Patient Dashboard</span>
<div>
<button class="btn btn-warning me-2" onclick="goProfile()">Profile</button>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow mb-4">
<div class="card-body">
<h4>Welcome, <span id="patientName"></span></h4>
<p class="text-muted">Here are your sleep reports reviewed by your doctor.</p>
</div>
</div>

<div class="card shadow">
<div class="card-header bg-primary text-white">
Your Sleep Reports
</div>
<div class="card-body">

<table class="table table-bordered table-hover text-center align-middle">
<thead class="table-light">
<tr>
<th>Date</th>
<th>Heart Rate</th>
<th>AHI</th>
<th>AI Severity</th>
<th>Doctor Severity</th>
<th>Doctor Notes</th>
</tr>
</thead>
<tbody id="reportTable">
<tr><td colspan="6">Loading...</td></tr>
</tbody>
</table>

</div>
</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "patient"){
window.location.href="patient_login.html";
}

document.getElementById("patientName").innerText = user.name;

function logout(){
localStorage.clear();
window.location.href="patient_login.html";
}

function goProfile(){
window.location.href="patient_profile.html";
}

function severityBadge(sev){
if(!sev) return "-";

if(sev === "Mild") return `<span class="badge bg-success">${sev}</span>`;
if(sev === "Moderate") return `<span class="badge bg-warning text-dark">${sev}</span>`;
if(sev === "Severe") return `<span class="badge bg-danger">${sev}</span>`;

return sev;
}

async function loadReports(){

const response = await fetch(`/patient/reports/${user.user_id}`);
const data = await response.json();

const table = document.getElementById("reportTable");
table.innerHTML="";

if(data.length === 0){
table.innerHTML="<tr><td colspan='6'>No reports available</td></tr>";
return;
}

data.forEach(r => {

table.innerHTML += `
<tr>
<td>${new Date(r.session_date).toLocaleString()}</td>
<td>${r.heart_rate ?? "-"}</td>
<td>${r.ahi ?? "-"}</td>
<td>${severityBadge(r.ai_severity)}</td>
<td>${severityBadge(r.confirmed_severity)}</td>
<td>${r.doctor_notes ?? "-"}</td>
</tr>
`;

});

}

loadReports();

</script>

</body>
</html>
