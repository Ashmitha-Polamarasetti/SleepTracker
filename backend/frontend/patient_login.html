<!DOCTYPE html>
<html>
<head>
<title>Patient Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card {
    width:400px;
    border-radius:20px;
}
</style>
</head>
<body>

<div class="card shadow p-4">
<h3 class="text-center mb-3">Patient Login</h3>

<form id="loginForm">

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" class="form-control" id="password" required>
</div>

<button type="submit" class="btn btn-success w-100">Login</button>
<div id="msg" class="text-danger text-center mt-2"></div>

</form>

<hr>

<div class="text-center">
<a href="patient_signup.html" class="d-block mb-2">Create new account</a>

<!-- 🔥 Back to Home Added -->
<button class="btn btn-outline-light w-100"
onclick="window.location.href='/'">
⬅ Back to Home
</button>

</div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const response = await fetch("/login", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({email, password})
});

const data = await response.json();

if(response.ok){

if(data.role !== "patient"){
document.getElementById("msg").innerText="Not a patient account";
return;
}

localStorage.setItem("user", JSON.stringify(data));
window.location.href="patient_dashboard.html";

}else{
document.getElementById("msg").innerText=data.detail || "Login failed";
}

});
</script>

</body>
</html>
